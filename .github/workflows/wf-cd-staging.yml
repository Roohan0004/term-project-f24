name: wf-cd-staging
on:
  push:
    branches:
      - release/** 
jobs:
  cd-build-staging-job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo 
        uses: actions/checkout@v4
        with:
          ref: ${{github.ref}}
      - name: Create Build Artifacts
        run: |
          npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"
      - name: Upload Staging Artifacts
        uses: actions/upload-pages-artifact@v3 
        with:
          path: "./dist"
          name: "staging-artifact"
  cd-deploy-staging-job:
    needs: "cd-build-staging-job"
    environment: "staging-env"
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Artifacts 
        uses: actions/deploy-pages@v4 
        with:
          artifact_name: "staging-artifact"
          token: ${{github.token}}
    